appId: com.magenta9.kanban
productName: Kanban
publish: null
directories:
  output: release-electron
files:
  - package.json
  - packages/main/dist/**
  - packages/preload/dist/**
  - packages/renderer/dist/**
  - packages/shared/dist/**
  - build/icon.png
extraResources:
  - from: native/cloudkit-helper/dist/KanbanCloudKitHelper
    to: KanbanCloudKitHelper
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
asarUnpack:
  - "**/*.node"
